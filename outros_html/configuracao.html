<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../assets/css/configuracao.css">
    <link rel="stylesheet" href="../css/cards.css">
    <link rel="stylesheet" href="../css/botoes.css">
</head>

<body>
    <div class="container">

        <main class="main-content">
            <h2>Página de Configuração</h2>

            <div class="cards-container">
                <div class="card">
                    <h3 class="card-title">Perfil do Usuário</h3>
                    <form class="card-form">
                        <label for="nome">Nome: </label>
                        <input class="card-input" type="text" id="nome" name="nome" required>

                        <label for="email">Email: </label>
                        <input class="card-input" type="email" id="email" name="email" required>

                        <label for="senha">Senha: </label>
                        <input class="card-input" type="password" id="senha" name="senha">

                        <button type="submit" class="btn">Salvar Alterações</button>
                    </form>
                </div>

                <!-- CARD: Preferências -->
                <div class="card">
                    <h3 class="card-title">Preferências do Sistema</h3>
                    <form class="card-form">
                        <label for="tema">Tema:</label>
                        <select id="tema" name="tema">
                            <option value="claro">Claro</option>
                            <option value="escuro">Escuro</option>
                        </select>

                        <label for="notificacoes">Notificações:</label>
                        <input type="checkbox" id="notificacoes" name="notificacoes" checked>

                        <button type="submit" class="btn">Salvar Preferências</button>
                    </form>
                </div>

                <!-- CARD: Segurança -->
                <div class="card">
                    <h3 class="card-title">Segurança</h3>
                    <form class="card-form">
                        <label for="senha-atual">Senha Atual:</label>
                        <input class="card-input" type="password" id="senha-atual" name="senha-atual" required>

                        <label for="nova-senha">Nova Senha:</label>
                        <input class="card-input" type="password" id="nova-senha" name="nova-senha" required>

                        <button type="submit" class="btn">Alterar Senha</button>
                    </form>
                </div>

                <div class="card">
                    <h3 class="card-title">Backup de Dados</h3>
                    <p>Você pode baixar um backup completo do sistema ou restaurar dados anteriores.</p>
                    <div class="card-actions">
                        <button class="btn">Fazer Backup</button>
                        <button class="btn-backup">Restaurar Backup</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
