<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="../assets/css/form.css">

<body>

    <header>
        <h1>Cadastro de Clientes</h1>
    </header>

    <div class="container">
        <section class="form-section">

            <form class="formulario" id="form-cliente">

                <div class="form-label">
                    <label class="label" for="nome-cliente">Nome: </label>
                    <input tipe="text" id="nome-cliente" required>
                </div>

                <div class="form-label">
                    <label class="label" for="numero-cliente">Número: </label>
                    <input tipe="number" id="numero-cliente" required>
                </div>

                <div class="form-label">
                    <label class="label" for="endereco-cliente">Endereço: </label>
                    <input tipe="text" id="endereco-cliente" required>
                </div>

                <div class="form-label">
                    <label class="label" for="cpf-cliente">CPF: </label>
                    <input tipe="number" id="cpf-cliente" required>
                </div>

                <div class="botoes">
                    <button class="btn-cadastrar" type="submit" id="btn-cliente" >Cadastrar: </button>
                    <a href="../dashboard.html" class="btn-voltar" id="voltar-btn-cliente" >Voltar</a>
                </div>
                
            </form>
        </section>
    </div>
    <script src="../js/cadastro_cliente.js"> </script>
</body>
