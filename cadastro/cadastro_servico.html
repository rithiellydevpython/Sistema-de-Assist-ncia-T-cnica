<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Serviço</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/form.css">
    <link rel="stylesheet" href="/static/css/botoes.css">
</head>

<body>

    <header>
        <h1>Cadastro de serviço</h1>
    </header>

    <div class="container">
        <section class="form-section">

            <form class="formulario" id="form-servico">

                <div class="form-label">
                    <label class="label" for="modelo-servico"> Modelo: </label>
                    <input type="text" id="modelo-servico" name="modelo" required>
                </div>

                <div class="form-label">
                    <label class="label" for="servico-realizado"> Serviço realizado </label>
                    <input type="text" id="servico-realizado" name="servico" required>
                </div>

                <div class="form-label">
                    <label class="label" for="cliente-servico"> cliente: </label>
                    <input type="text" id="cliente-servico" name="cliente" required>
                </div>

                <div class="form-label">
                    <label class="label" for="data-servico">Data de entrega: </label>
                    <input type="data" id="data-servico" name="data" required>
                </div>

                <div class="form-label">
                    <label class="label" for="valor-servico">Valor: </label>
                    <input type="number" id="valor-servico" name="valor" required>
                </div>

                <div class="form-label">
                    <label class="label" for="status-servico">Status</label>
                    <select id="status-servico" name="status" required>
                        <option value="em andamento">Em andamento</option>
                        <option value="concluido">Concluído</option>
                        <option value="orçamento">Orçamento</option>
                    </select>
                </div>

                <div class="botoes">
                    <button class="btn-cadastrar" type="submit" id="btn-servico">Cadastrar</button>
                    <a href="/html/dashboard/dashboard.html" class="btn-voltar" id="servico-btn-voltar">Voltar</a>
                </div>

            </form>

        </section>
        <script src="/static/js/cadastro/cadastro_servico.js"></script>
    </div>
   
</body>
