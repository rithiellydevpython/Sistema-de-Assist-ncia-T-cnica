<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="/static/css/botoes.css">
</head>

<body>

    <main>
        <div class="container">

            <section class="login">

                <form action="/html/dashboard" method="get" class="login-form">

                    <h2>Login</h2>

                    <div class="div-form">
                        <label class="label-group" for="username">Usuário</label>
                        <input class="input-group" type="text" id="username" name="username" required>
                    </div>

                    <div class="div-form">
                        <label class="label-group" for="password">Senha</label>
                        <input class="input-group" type="password" id="password" name="password" required>
                    </div>

                    <div class="btn-group">
                        <button type="submit" class="btn">Cadastrar</button>
                    </div>

                    <p class="error-message" style="display:none;">Usuário ou senha incorretos!</p>

                </form>

            </section>
        </div>
    </main>

</body>

</html>
